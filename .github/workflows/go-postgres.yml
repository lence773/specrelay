name: Go and PostgreSQL

on:
  push:
    paths:
      - 'backend/**'
      - 'api/**'
      - 'deploy/**'
      - '.github/workflows/go-postgres.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'api/**'
      - 'deploy/**'
      - '.github/workflows/go-postgres.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PostgreSQL 18 validation is temporarily paused.
        postgres: ['16']
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_DB: specrelay_test
          POSTGRES_USER: specrelay
          POSTGRES_PASSWORD: specrelay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U specrelay -d specrelay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://specrelay:specrelay_test@127.0.0.1:5432/specrelay_test?sslmode=disable
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Unit and integration tests
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Production build
        run: go build -trimpath -o /tmp/specrelay ./cmd/specrelay
