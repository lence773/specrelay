name: specrelay

# Docker is intentionally limited to PostgreSQL. The Go backend must run on the
# host so that it can access local project directories and the user's Codex or
# Claude CLI installation.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: specrelay
      POSTGRES_USER: specrelay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-specrelay-dev-only}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54329}:5432"
    volumes:
      - specrelay-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specrelay -d specrelay"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  specrelay-postgres:
