openapi: 3.1.0
info:
  title: SpecRelay Local API
  version: 1.0.0
  description: Contract for the Go/PostgreSQL SpecRelay service. All mutating resource operations use optimistic versions.
servers:
  - url: /api/v1
security:
  - sessionCookie: []
  - bearerToken: []
tags:
  - {name: Health}
  - {name: Projects}
  - {name: Filesystem}
  - {name: Intakes}
  - {name: Plans}
  - {name: Tasks}
  - {name: Feedback}
  - {name: Checkpoints}
  - {name: Events}
  - {name: Settings}
paths:
  /auth/exchange:
    post:
      security: []
      operationId: exchangeAccessToken
      requestBody: {required: false, content: {application/json: {schema: {type: object, properties: {token: {type: string}}}}}}
      responses:
        '200': {description: Authenticated, headers: {Set-Cookie: {schema: {type: string}}}, content: {application/json: {schema: {type: object, properties: {state: {const: authenticated}}}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /filesystem/directories:
    get:
      tags: [Filesystem]
      operationId: listDirectories
      parameters: [{name: path, in: query, required: false, schema: {type: string}, description: Absolute directory path; defaults to the local user home directory}]
      responses: {'200': {description: Directory listing, content: {application/json: {schema: {$ref: '#/components/schemas/DirectoryListing'}}}}, default: {$ref: '#/components/responses/Error'}}
  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      responses: {'200': {description: Projects, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Project'}}}}}, default: {$ref: '#/components/responses/Error'}}
    post:
      tags: [Projects]
      operationId: createProject
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ProjectInput'}}}}
      responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Project'}}}}, default: {$ref: '#/components/responses/Error'}}
  /projects/{projectId}:
    parameters: [{$ref: '#/components/parameters/ProjectId'}]
    get:
      tags: [Projects]
      operationId: getProject
      responses: {'200': {description: Project, content: {application/json: {schema: {$ref: '#/components/schemas/Project'}}}}, default: {$ref: '#/components/responses/Error'}}
    put:
      tags: [Projects]
      operationId: updateProject
      requestBody: {required: true, content: {application/json: {schema: {allOf: [{$ref: '#/components/schemas/ProjectInput'}, {$ref: '#/components/schemas/VersionInput'}]}}}}
      responses: {'200': {description: Updated, content: {application/json: {schema: {$ref: '#/components/schemas/Project'}}}}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
    delete:
      tags: [Projects]
      operationId: deleteProject
      parameters: [{name: version, in: query, required: true, schema: {type: integer, format: int64}}]
      responses: {'204': {description: Deleted}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /projects/{projectId}/settings:
    parameters: [{$ref: '#/components/parameters/ProjectId'}]
    get:
      tags: [Projects]
      operationId: getProjectSettings
      responses: {'200': {description: Settings, content: {application/json: {schema: {$ref: '#/components/schemas/ProjectSettings'}}}}, default: {$ref: '#/components/responses/Error'}}
    put:
      tags: [Projects]
      operationId: updateProjectSettings
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ProjectSettings'}}}}
      responses: {'200': {description: Settings, content: {application/json: {schema: {$ref: '#/components/schemas/ProjectSettings'}}}}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /projects/{projectId}/automation/{action}:
    parameters: [{$ref: '#/components/parameters/ProjectId'}, {name: action, in: path, required: true, schema: {type: string, enum: [start, stop]}}]
    post:
      tags: [Projects]
      operationId: setProjectAutomation
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/VersionInput'}}}}
      responses: {'200': {description: Updated project, content: {application/json: {schema: {$ref: '#/components/schemas/Project'}}}}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /projects/{projectId}/intakes:
    parameters: [{$ref: '#/components/parameters/ProjectId'}]
    get:
      tags: [Intakes]
      operationId: listIntakes
      responses: {'200': {description: Intakes, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Intake'}}}}}, default: {$ref: '#/components/responses/Error'}}
    post:
      tags: [Intakes]
      operationId: createIntake
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/IntakeInput'}}}}
      responses: {'201': {description: Created, content: {application/json: {schema: {type: object, required: [intake], properties: {intake: {$ref: '#/components/schemas/Intake'}, job: {oneOf: [{$ref: '#/components/schemas/Job'}, {type: 'null'}]}}}}}}, default: {$ref: '#/components/responses/Error'}}
  /projects/{projectId}/intakes/discuss:
    parameters: [{$ref: '#/components/parameters/ProjectId'}]
    post:
      tags: [Intakes]
      operationId: discussRequirement
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RequirementDiscussionRequest'}}}}
      responses: {'200': {description: Requirement discussion response, content: {application/json: {schema: {$ref: '#/components/schemas/RequirementDiscussionResult'}}}}, default: {$ref: '#/components/responses/Error'}}
  /projects/{projectId}/feedback:
    parameters: [{$ref: '#/components/parameters/ProjectId'}]
    post:
      tags: [Feedback]
      operationId: createFeedback
      description: Creates feedback only after the parent requirement and every optional plan/task/checkpoint/file/diff association have been validated as one chain in this project. Validation and writes use one transaction.
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/FeedbackCreateInput'}}}}
      responses:
        '201': {description: Feedback created, content: {application/json: {schema: {$ref: '#/components/schemas/FeedbackCreateResponse'}}}}
        '400': {description: Error code is invalid_feedback_relation for a broken hierarchy or invalid_diff_range for an incomplete/out-of-hunk line range, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '403': {description: Error code resource_forbidden; no referenced content from another project is returned, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '404': {description: Error code resource_not_found; a referenced resource does not exist, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        default: {$ref: '#/components/responses/Error'}
  /projects/{projectId}/feedback/{feedbackId}:
    parameters: [{$ref: '#/components/parameters/ProjectId'}, {$ref: '#/components/parameters/FeedbackId'}]
    get:
      tags: [Feedback]
      operationId: getFeedbackContext
      description: Read-only, size-bounded context for review. It includes the original requirement, optional execution location, selected Diff fragment, task acceptance state, and subsequent revision state without returning unrestricted source text.
      responses:
        '200': {description: Bounded feedback context, content: {application/json: {schema: {$ref: '#/components/schemas/FeedbackContext'}}}}
        '403': {description: Error code resource_forbidden; feedback is not accessible in this project, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '404': {$ref: '#/components/responses/Error'}
        default: {$ref: '#/components/responses/Error'}
  /intakes/{intakeId}:
    parameters: [{$ref: '#/components/parameters/IntakeId'}]
    get:
      tags: [Intakes]
      operationId: getIntake
      responses: {'200': {description: Intake, content: {application/json: {schema: {$ref: '#/components/schemas/Intake'}}}}, default: {$ref: '#/components/responses/Error'}}
    put:
      tags: [Intakes]
      operationId: updateIntake
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [title, body, status, version], properties: {title: {type: string}, body: {type: string}, status: {$ref: '#/components/schemas/IntakeStatus'}, version: {type: integer, format: int64}}}}}}
      responses: {'200': {description: Updated, content: {application/json: {schema: {$ref: '#/components/schemas/Intake'}}}}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /intakes/{intakeId}/generate:
    parameters: [{$ref: '#/components/parameters/IntakeId'}]
    post:
      tags: [Intakes]
      operationId: generatePlan
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PlanGenerationInput'}}}}
      responses: {'202': {$ref: '#/components/responses/Accepted'}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /intakes/{intakeId}/attachments:
    parameters: [{$ref: '#/components/parameters/IntakeId'}]
    post:
      tags: [Intakes]
      operationId: uploadAttachment
      requestBody: {required: true, content: {multipart/form-data: {schema: {type: object, required: [file], properties: {file: {type: string, format: binary}}}}}}
      responses: {'201': {description: Attachment, content: {application/json: {schema: {$ref: '#/components/schemas/Attachment'}}}}, default: {$ref: '#/components/responses/Error'}}
  /projects/{projectId}/plans:
    parameters: [{$ref: '#/components/parameters/ProjectId'}]
    get:
      tags: [Plans]
      operationId: listPlans
      responses: {'200': {description: Plans, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Plan'}}}}}, default: {$ref: '#/components/responses/Error'}}
  /plans/{planId}:
    parameters: [{$ref: '#/components/parameters/PlanId'}]
    get:
      tags: [Plans]
      operationId: getPlan
      responses: {'200': {description: Plan detail with reverse feedback references, content: {application/json: {schema: {type: object, required: [plan, tasks, feedback], properties: {plan: {$ref: '#/components/schemas/Plan'}, tasks: {type: array, items: {$ref: '#/components/schemas/PlanTask'}}, feedback: {type: array, items: {$ref: '#/components/schemas/FeedbackReference'}}}}}}}, default: {$ref: '#/components/responses/Error'}}
    delete:
      tags: [Plans]
      operationId: deletePlan
      parameters: [{name: version, in: query, required: true, schema: {type: integer, format: int64, minimum: 1}}]
      responses: {'204': {description: Deleted}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /plans/{planId}/tasks:
    parameters: [{$ref: '#/components/parameters/PlanId'}]
    get:
      tags: [Tasks]
      operationId: listPlanTasks
      responses: {'200': {description: Tasks, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PlanTask'}}}}}, default: {$ref: '#/components/responses/Error'}}
  /plans/{planId}/run:
    parameters: [{$ref: '#/components/parameters/PlanId'}]
    post:
      tags: [Plans]
      operationId: runPlan
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PlanRunInput'}}}}
      responses: {'202': {$ref: '#/components/responses/Accepted'}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /plans/{planId}/stop:
    parameters: [{$ref: '#/components/parameters/PlanId'}]
    post:
      tags: [Plans]
      operationId: stopPlan
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/VersionInput'}}}}
      responses: {'202': {description: Stop requested, content: {application/json: {schema: {type: object, required: [plan, jobIds], properties: {plan: {$ref: '#/components/schemas/Plan'}, jobIds: {type: array, items: {type: string, format: uuid}}}}}}}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /tasks/{taskId}:
    parameters: [{$ref: '#/components/parameters/TaskId'}]
    get:
      tags: [Tasks]
      operationId: getTask
      responses: {'200': {description: Task detail with reverse feedback references and current revision status, content: {application/json: {schema: {type: object, required: [task, feedback], properties: {task: {$ref: '#/components/schemas/PlanTask'}, feedback: {type: array, items: {$ref: '#/components/schemas/FeedbackReference'}}}}}}}, default: {$ref: '#/components/responses/Error'}}
  /checkpoints/{checkpointId}:
    parameters: [{$ref: '#/components/parameters/CheckpointId'}]
    get:
      tags: [Checkpoints]
      operationId: getCheckpoint
      responses: {'200': {description: Immutable checkpoint detail with reverse feedback references and current revision status, content: {application/json: {schema: {type: object, required: [checkpoint, feedback], properties: {checkpoint: {$ref: '#/components/schemas/PlanExecutionSnapshot'}, feedback: {type: array, items: {$ref: '#/components/schemas/FeedbackReference'}}}}}}}, default: {$ref: '#/components/responses/Error'}}
  /tasks/{taskId}/{action}:
    parameters: [{$ref: '#/components/parameters/TaskId'}, {name: action, in: path, required: true, schema: {type: string, enum: [run, retry]}}]
    post:
      tags: [Tasks]
      operationId: runTask
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TaskRunInput'}}}}
      responses: {'202': {$ref: '#/components/responses/Accepted'}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /tasks/{taskId}/stop:
    parameters: [{$ref: '#/components/parameters/TaskId'}]
    post:
      tags: [Tasks]
      operationId: stopTask
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/VersionInput'}}}}
      responses: {'202': {description: Stop requested, content: {application/json: {schema: {type: object, required: [task, jobIds], properties: {task: {$ref: '#/components/schemas/PlanTask'}, jobIds: {type: array, items: {type: string, format: uuid}}}}}}}, '409': {$ref: '#/components/responses/VersionConflict'}, default: {$ref: '#/components/responses/Error'}}
  /projects/{projectId}/agent-runs:
    parameters: [{$ref: '#/components/parameters/ProjectId'}]
    get:
      tags: [AgentRuns]
      operationId: listAgentRuns
      parameters: [{name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 100}}]
      responses: {'200': {description: Agent runs, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/AgentRun'}}}}}, default: {$ref: '#/components/responses/Error'}}
  /projects/{projectId}/observability:
    parameters: [{$ref: '#/components/parameters/ProjectId'}]
    get:
      tags: [AgentRuns]
      operationId: queryProjectObservability
      description: Query structured local Agent Run observability. The service reads only the local database and calculates logical-operation success rates without counting snapshot fallback calls as separate business executions.
      parameters:
        - {name: from, in: query, required: false, schema: {type: string, format: date-time}, description: Inclusive Agent Run start time}
        - {name: to, in: query, required: false, schema: {type: string, format: date-time}, description: Inclusive Agent Run start time}
        - {name: provider, in: query, required: false, schema: {$ref: '#/components/schemas/AgentRunProvider'}}
        - {name: planId, in: query, required: false, schema: {type: string, format: uuid}, description: Plan owned by the current project}
        - {name: page, in: query, required: false, schema: {type: integer, minimum: 1, default: 1}}
        - {name: pageSize, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200': {description: Filtered runs, related business entities, and local aggregates, content: {application/json: {schema: {$ref: '#/components/schemas/AgentRunObservabilityResponse'}}}}
        '400': {$ref: '#/components/responses/Error'}
        default: {$ref: '#/components/responses/Error'}
  /projects/{projectId}/observability/export:
    parameters: [{$ref: '#/components/parameters/ProjectId'}]
    get:
      tags: [AgentRuns]
      operationId: exportProjectObservability
      description: Generate a redacted JSON or CSV download entirely in the local backend. Sensitive project metadata and business titles are excluded by default and can be enabled independently.
      parameters:
        - {name: from, in: query, required: false, schema: {type: string, format: date-time}}
        - {name: to, in: query, required: false, schema: {type: string, format: date-time}}
        - {name: provider, in: query, required: false, schema: {$ref: '#/components/schemas/AgentRunProvider'}}
        - {name: planId, in: query, required: false, schema: {type: string, format: uuid}}
        - {name: format, in: query, required: false, schema: {type: string, enum: [json, csv], default: json}}
        - {name: includeProjectName, in: query, required: false, schema: {type: boolean, default: false}}
        - {name: includeWorkspacePath, in: query, required: false, schema: {type: boolean, default: false}}
        - {name: includeBusinessTitles, in: query, required: false, schema: {type: boolean, default: false}}
      responses:
        '200':
          description: Local redacted summary download
          headers: {Content-Disposition: {schema: {type: string}}}
          content:
            application/json: {schema: {$ref: '#/components/schemas/AgentRunObservabilityExport'}}
            text/csv: {schema: {type: string}}
        '400': {$ref: '#/components/responses/Error'}
        default: {$ref: '#/components/responses/Error'}
  /agent-runs/{agentRunId}/log:
    parameters: [{name: agentRunId, in: path, required: true, schema: {type: string, format: uuid}}]
    get:
      tags: [AgentRuns]
      operationId: getAgentRunLog
      parameters: [{name: before, in: query, required: false, schema: {type: integer, format: int64, minimum: 0}, description: Exclusive byte cursor returned by nextBefore; omit for newest entries}, {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}, description: Number of complete log entries to return}]
      responses: {'200': {description: Latest complete agent log entries, returned in chronological order, content: {application/json: {schema: {$ref: '#/components/schemas/AgentRunLog'}}}}, default: {$ref: '#/components/responses/Error'}}
  /agents/probe:
    post:
      tags: [Projects]
      operationId: probeAgent
      description: Detect both configured local CLI commands. This diagnostic operation never selects a business execution provider and never changes ProjectSettings.agentProvider.
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [projectId], additionalProperties: false, properties: {projectId: {type: string, format: uuid}}}}}}
      responses: {'200': {description: Independent Codex CLI and Claude CLI probe results, content: {application/json: {schema: {$ref: '#/components/schemas/CLIProbeResponse'}}}}, default: {$ref: '#/components/responses/Error'}}
  /settings/mcp-token/rotate:
    post:
      tags: [Settings]
      operationId: rotateMcpToken
      responses: {'201': {description: New token returned once, content: {application/json: {schema: {type: object, required: [token], properties: {token: {type: string}}}}}}, default: {$ref: '#/components/responses/Error'}}
  /events:
    get:
      tags: [Events]
      operationId: listEvents
      description: Returns one project event-history page from newest to oldest. The before cursor is exclusive and must be copied from the preceding page's nextBefore value.
      parameters:
        - {name: projectId, in: query, required: true, schema: {type: string, format: uuid}}
        - {name: before, in: query, required: false, schema: {type: integer, format: int64, minimum: 1}, description: Exclusive event ID cursor; omit for the newest page}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 1000, default: 10}, description: Maximum number of visible events to return}
      responses: {'200': {description: Event history page ordered from newest to oldest, content: {application/json: {schema: {$ref: '#/components/schemas/EventPage'}}}}, '400': {$ref: '#/components/responses/Error'}, default: {$ref: '#/components/responses/Error'}}
  /events/stream:
    get:
      tags: [Events]
      operationId: streamEvents
      description: Replays visible events strictly after the greater of Last-Event-ID and after, then continues streaming them from oldest to newest. agent.output records are never emitted.
      parameters:
        - {name: projectId, in: query, required: false, schema: {type: string, format: uuid}}
        - {name: after, in: query, required: false, schema: {type: integer, format: int64, minimum: 0}, description: Exclusive event ID used for incremental recovery}
        - {name: Last-Event-ID, in: header, required: false, schema: {type: integer, format: int64, minimum: 0}, description: Exclusive SSE event ID supplied by a reconnecting client}
      responses: {'200': {description: Server-sent Event records ordered from oldest to newest, content: {text/event-stream: {schema: {type: string}}}}, '400': {$ref: '#/components/responses/Error'}, default: {$ref: '#/components/responses/Error'}}
components:
  securitySchemes:
    sessionCookie: {type: apiKey, in: cookie, name: specrelay_session}
    bearerToken: {type: http, scheme: bearer}
  parameters:
    ProjectId: {name: projectId, in: path, required: true, schema: {type: string, format: uuid}}
    IntakeId: {name: intakeId, in: path, required: true, schema: {type: string, format: uuid}}
    PlanId: {name: planId, in: path, required: true, schema: {type: string, format: uuid}}
    TaskId: {name: taskId, in: path, required: true, schema: {type: string, format: uuid}}
    FeedbackId: {name: feedbackId, in: path, required: true, schema: {type: string, format: uuid}}
    CheckpointId: {name: checkpointId, in: path, required: true, schema: {type: string, format: uuid}}
  responses:
    Accepted: {description: Job queued, content: {application/json: {schema: {$ref: '#/components/schemas/AsyncResponse'}}}}
    Error: {description: Error response, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
    Unauthorized: {description: Authentication required, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
    VersionConflict: {description: Optimistic version conflict, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
  schemas:
    CLIProvider:
      type: string
      enum: [codex, claude]
      description: CLI provider used for a business agent invocation. No other provider value is valid.
    VersionInput: {type: object, required: [version], properties: {version: {type: integer, format: int64, minimum: 1}}}
    PlanGenerationInput:
      type: object
      required: [version]
      additionalProperties: false
      properties:
        version: {type: integer, format: int64, minimum: 1}
        provider:
          $ref: '#/components/schemas/CLIProvider'
          description: Optional provider override for this plan-generation job. When omitted, the server uses the project's current ProjectSettings.agentProvider; clients must not materialize that default.
    PlanRunInput:
      type: object
      required: [version]
      additionalProperties: false
      properties:
        version: {type: integer, format: int64, minimum: 1}
        provider:
          $ref: '#/components/schemas/CLIProvider'
          description: Optional provider override for this plan execution. An explicit value applies to every ordinary downstream task queued by this run and is retained by automatic retries of those jobs. When omitted, downstream jobs also omit the override and resolve ProjectSettings.agentProvider on the server.
    TaskRunInput:
      type: object
      required: [version]
      additionalProperties: false
      properties:
        version: {type: integer, format: int64, minimum: 1}
        provider:
          $ref: '#/components/schemas/CLIProvider'
          description: Optional provider override for this newly queued manual run or retry. Manual retries do not implicitly inherit a previous job's provider; omission uses the project's current ProjectSettings.agentProvider. Automatic retries of this same job retain its original payload.
    DirectoryEntry: {type: object, required: [name, path], properties: {name: {type: string}, path: {type: string}}}
    DirectoryListing: {type: object, required: [path, roots, directories], properties: {path: {type: string}, parentPath: {type: string}, roots: {type: array, items: {$ref: '#/components/schemas/DirectoryEntry'}}, directories: {type: array, items: {$ref: '#/components/schemas/DirectoryEntry'}}}}
    ProjectInput: {type: object, required: [name, workspacePath], properties: {name: {type: string, minLength: 1}, description: {type: string}, workspacePath: {type: string, minLength: 1}}}
    ResourceBase: {type: object, required: [id, createdAt, updatedAt, version], properties: {id: {type: string, format: uuid}, createdAt: {type: string, format: date-time}, updatedAt: {type: string, format: date-time}, version: {type: integer, format: int64}}}
    Project: {allOf: [{$ref: '#/components/schemas/ResourceBase'}, {type: object, required: [name, description, workspacePath, automationEnabled], properties: {name: {type: string}, description: {type: string}, workspacePath: {type: string}, automationEnabled: {type: boolean}}}]}
    ProjectSettings:
      type: object
      required: [projectId, validationCommand, agentProvider, codexCommand, codexArgs, claudeCommand, claudeArgs, planGenerationTimeoutSeconds, taskExecutionTimeoutSeconds, maxRetries, allowedEnv, createdAt, updatedAt, version]
      properties: {projectId: {type: string, format: uuid}, validationCommand: {type: string}, agentProvider: {$ref: '#/components/schemas/CLIProvider'}, codexCommand: {type: string}, codexArgs: {type: array, items: {type: string}}, claudeCommand: {type: string}, claudeArgs: {type: array, items: {type: string}}, planGenerationTimeoutSeconds: {type: integer}, taskExecutionTimeoutSeconds: {type: integer}, maxRetries: {type: integer}, allowedEnv: {type: array, items: {type: string}}, createdAt: {type: string, format: date-time}, updatedAt: {type: string, format: date-time}, version: {type: integer, format: int64}}
    RequirementDiscussionMessage:
      type: object
      required: [role, content]
      additionalProperties: false
      properties:
        role: {type: string, enum: [user, assistant]}
        content: {type: string, minLength: 1}
    RequirementDiscussionRequest:
      type: object
      required: [title, body, messages]
      additionalProperties: false
      properties:
        title: {type: string}
        body: {type: string}
        provider:
          $ref: '#/components/schemas/CLIProvider'
          description: Optional provider override for this discussion round only. Every later round resolves its own request independently; omission uses the project's current ProjectSettings.agentProvider and does not lock the provider returned by an earlier round.
        sessionId:
          type: string
          description: CLI session ID returned by the previous discussion round. It is used to continue the same provider conversation when available.
        sessionProvider:
          $ref: '#/components/schemas/CLIProvider'
          description: Provider that created sessionId. A changed provider starts a new discussion session instead of attempting cross-provider resume. Feedback discussions should omit client session identifiers because the server selects a stored session only after matching the feedback project, association, and provider.
        feedbackId:
          type: string
          format: uuid
          description: Optional feedback context for an independent revision discussion. It must belong to projectId; clients must not reuse session identifiers from another project, feedback item, or provider.
        createRevision:
          type: boolean
          default: false
          description: When true, feedbackId is required. If this round is ready, the server creates an independent revision requirement and may queue its plan according to project automation settings.
        messages:
          type: array
          minItems: 1
          maxItems: 24
          items: {$ref: '#/components/schemas/RequirementDiscussionMessage'}
    RequirementDiscussionResult:
      type: object
      required: [provider, reply, title, body, ready]
      additionalProperties: false
      properties:
        provider: {$ref: '#/components/schemas/CLIProvider'}
        reply: {type: string}
        title: {type: string}
        body: {type: string}
        ready: {type: boolean}
        sessionId: {type: string}
        revision: {$ref: '#/components/schemas/FeedbackRevisionDiscussionResult'}
    FeedbackRevisionDiscussionResult:
      type: object
      required: [intake, revision]
      additionalProperties: false
      properties:
        intake: {$ref: '#/components/schemas/Intake'}
        job:
          oneOf: [{$ref: '#/components/schemas/Job'}, {type: 'null'}]
        revision: {$ref: '#/components/schemas/FeedbackRevision'}
    FeedbackRevision:
      type: object
      required: [id, feedbackId, projectId, requirementId, revisionIntake, createdAt]
      additionalProperties: false
      properties:
        id: {type: string, format: uuid}
