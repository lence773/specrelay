<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpecRelay</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        background: #0b0d10;
        color: #edf2f5;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 76% -10%, #204438 0, transparent 38%),
          radial-gradient(circle at 12% 100%, #172937 0, transparent 42%),
          #0b0d10;
      }
      .titlebar {
        height: 44px;
        display: flex;
        align-items: center;
        padding-left: 18px;
        border-bottom: 1px solid #242b31;
        background: rgba(14, 18, 22, .82);
        user-select: none;
      }
      .brand { display: flex; align-items: center; gap: 9px; color: #f6f8f9; font-weight: 700; letter-spacing: -.02em; }
      .brand-mark { display: grid; place-items: center; width: 23px; height: 23px; border-radius: 7px; color: #092016; background: #90e7bf; font-size: 13px; }
      .brand small { color: #83909a; font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
      .window-actions { margin-left: auto; height: 100%; display: flex; }
      .window-actions button { width: 46px; border: 0; background: transparent; color: #b6c0c7; cursor: pointer; font-size: 17px; }
      .window-actions button:hover { background: #272e35; color: #fff; }
      .window-actions button.close:hover { background: #c84b4b; }
      .page { min-height: calc(100vh - 44px); display: grid; place-items: center; padding: 30px 22px; }
      .card { width: min(700px, 100%); max-height: calc(100vh - 105px); overflow: auto; padding: 34px; border: 1px solid #293238; border-radius: 18px; background: rgba(19, 24, 29, .94); box-shadow: 0 24px 80px #0009; }
      .eyebrow { margin: 0 0 9px; color: #90e7bf; font-size: 12px; font-weight: 800; letter-spacing: .12em; }
      h1 { margin: 0; font-size: clamp(24px, 4vw, 32px); line-height: 1.25; letter-spacing: -.04em; }
      .lead { margin: 13px 0 0; color: #b8c2c9; font-size: 15px; line-height: 1.72; }
      .notice { margin: 24px 0; padding: 13px 15px; border: 1px solid #314e43; border-radius: 11px; background: #13241e; color: #c8e6d8; font-size: 13px; line-height: 1.65; }
      .error { display: none; margin: 20px 0 0; padding: 12px 14px; border: 1px solid #754242; border-radius: 10px; background: #351d20; color: #ffcdcd; font-size: 13px; line-height: 1.55; white-space: pre-wrap; }
      form { display: grid; gap: 16px; }
      .field-grid { display: grid; grid-template-columns: minmax(0, 1fr) 140px; gap: 16px; }
      label { display: grid; gap: 7px; color: #d4dbe0; font-size: 13px; font-weight: 650; }
      input, select { width: 100%; min-width: 0; height: 42px; padding: 0 12px; border: 1px solid #374149; border-radius: 9px; outline: none; background: #0e1216; color: #eef3f5; font: inherit; font-size: 14px; }
      input:focus, select:focus { border-color: #6fc89b; box-shadow: 0 0 0 3px #4ea97b2c; }
      .helper { margin: -8px 0 2px; color: #83909a; font-size: 12px; line-height: 1.55; }
      .field-helper { color: #83909a; font-size: 11px; font-weight: 500; line-height: 1.45; }
      .submit { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; border: 0; border-radius: 10px; background: #90e7bf; color: #112219; font-weight: 800; cursor: pointer; font-size: 14px; }
      .submit:hover { background: #afeecf; }
      .submit:disabled { cursor: wait; opacity: .68; }
      .loading, .setup { display: none; }
      .loading { text-align: center; padding: 28px 14px 18px; }
      .loading.show, .setup.show { display: block; }
      .spinner { width: 34px; height: 34px; margin: 0 auto 20px; border: 3px solid #33434a; border-top-color: #90e7bf; border-radius: 50%; animation: spin .8s linear infinite; }
      .loading p { margin: 10px auto 0; max-width: 420px; color: #aeb9c0; line-height: 1.7; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (max-width: 560px) { .card { padding: 24px 20px; } .field-grid { grid-template-columns: 1fr; gap: 16px; } }
    </style>
  </head>
  <body>
    <header class="titlebar" data-tauri-drag-region>
      <div class="brand" data-tauri-drag-region><span class="brand-mark" data-tauri-drag-region>S</span><span data-tauri-drag-region>SpecRelay</span><small data-tauri-drag-region>Desktop</small></div>
      <div class="window-actions">
        <button type="button" id="minimize" aria-label="最小化" title="最小化">−</button>
        <button type="button" id="maximize" aria-label="最大化" title="最大化">□</button>
        <button type="button" id="close" class="close" aria-label="关闭" title="关闭">×</button>
      </div>
    </header>
    <div class="page">
      <main class="card">
        <section class="setup show" id="setup">
          <p class="eyebrow" id="setup-eyebrow">首次启动设置</p>
          <h1 id="setup-title">连接您的 PostgreSQL 数据库</h1>
          <p class="lead" id="setup-lead">SpecRelay 桌面端不会安装、携带或启动数据库。请填写一个由您管理且当前可访问的 PostgreSQL 数据库连接。</p>
          <div class="notice" id="setup-notice">保存后会启动本机后端服务。若数据库尚未初始化，服务会自动创建数据表并执行迁移；不会删除已有数据。</div>
          <form id="database-form">
            <div class="field-grid">
              <label>数据库主机<input id="host" name="host" value="127.0.0.1" autocomplete="off" required /></label>
              <label>端口<input id="port" name="port" value="5432" type="number" min="1" max="65535" required /></label>
            </div>
            <label>数据库名称<input id="database" name="database" value="specrelay" autocomplete="off" required /></label>
            <label>用户名<input id="username" name="username" value="specrelay" autocomplete="username" required /></label>
            <label>密码<input id="password" name="password" type="password" autocomplete="current-password" /><small class="field-helper" id="password-helper">请填写数据库密码；密码不会在此页面回显。</small></label>
            <label>SSL 模式
              <select id="sslMode" name="sslMode">
                <option value="disable">不使用 SSL（本机开发常用）</option>
                <option value="prefer">优先使用 SSL</option>
                <option value="require">必须使用 SSL</option>
                <option value="verify-ca">验证 CA</option>
                <option value="verify-full">验证 CA 和主机名</option>
              </select>
            </label>
            <p class="helper">密码及连接信息仅保存在当前操作系统用户的应用数据目录中，并尽量限制为当前用户可读。</p>
            <button class="submit" id="submit" type="submit">保存并连接数据库</button>
          </form>
          <p class="error" id="error" role="alert"></p>
        </section>
        <section class="loading" id="loading" aria-live="polite">
          <div class="spinner" aria-label="正在加载"></div>
          <h1 id="loading-title">正在启动 SpecRelay…</h1>
          <p id="loading-detail">正在连接数据库并启动本机服务。</p>
        </section>
      </main>
    </div>
    <script src="./bootstrap.js"></script>
  </body>
</html>
