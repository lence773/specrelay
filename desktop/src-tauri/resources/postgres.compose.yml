# Packaged database dependency. SpecRelay starts only this PostgreSQL service;
# the API server and Codex/Claude CLI always run on the host machine.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: specrelay
      POSTGRES_USER: specrelay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - specrelay-desktop-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specrelay -d specrelay"]
      interval: 3s
      timeout: 3s
      retries: 30

volumes:
  specrelay-desktop-postgres:
