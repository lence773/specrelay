        requirementId: {type: string, format: uuid}
        revisionIntake: {$ref: '#/components/schemas/Intake'}
        revisionPlan: {$ref: '#/components/schemas/Plan'}
        createdAt: {type: string, format: date-time}
    IntakeStatus: {type: string, enum: [open, planning, planned, closed, plan_failed]}
    IntakeInput:
      type: object
      required: [kind, title, body]
      additionalProperties: false
      properties:
        kind: {type: string, enum: [requirement, feedback]}
        parentIntakeId:
          type: [string, 'null']
          format: uuid
          description: Required when kind is feedback. Must directly reference a requirement in the same project; feedback cannot be nested under feedback.
        title: {type: string, minLength: 1}
        body: {type: string}
        provider:
          $ref: '#/components/schemas/CLIProvider'
          description: Optional provider override only for plan generation automatically queued when this request creates a requirement or feedback with project automation enabled. When omitted, the queued job carries no override and uses ProjectSettings.agentProvider on the server. It does not change the project default.
        planId: {type: [string, 'null'], format: uuid, description: Feedback only. The plan must belong to parentIntakeId in this project.}
        taskId: {type: [string, 'null'], format: uuid, description: Feedback only. Requires planId and must belong to that plan.}
        checkpointId: {type: [string, 'null'], format: uuid, description: Feedback only. Requires taskId and must be an immutable task checkpoint for that task.}
        fileId: {type: [string, 'null'], format: uuid, description: Feedback only. Requires checkpointId and must identify a changed file in that checkpoint.}
        diffHunkId: {type: [string, 'null'], format: uuid, description: Feedback only. Requires fileId and must identify a hunk in that file.}
        diffLineSide: {type: string, enum: [old, new], description: Feedback only. When present, diffHunkId, diffLineStart, and diffLineEnd are all required.}
        diffLineStart: {type: integer, minimum: 1, description: Inclusive source or destination line according to diffLineSide.}
        diffLineEnd: {type: integer, minimum: 1, description: Inclusive source or destination line; must be within the selected hunk and not precede diffLineStart.}
        requirementSessionId:
          type: string
          description: Durable CLI session from the requirement discussion. Only valid when kind is requirement.
        requirementSessionProvider:
          $ref: '#/components/schemas/CLIProvider'
          description: Provider that created requirementSessionId. Only valid when kind is requirement.

